[pytest]
# 测试发现
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出格式
addopts =
    -ra
    --strict-markers
    --tb=short

# 忽略已知的 DeprecationWarning（curl_cffi / cryptography 等第三方库）
filterwarnings =
    ignore::DeprecationWarning:curl_cffi.*
    ignore::DeprecationWarning:cryptography.*
