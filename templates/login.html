<!doctype html>
<html lang="{{ lang }}" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="lang" content="{{ lang }}">
  <title>{{ _('login_title') }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/design.css?v=2">
</head>
<body>

<a href="{{ url_for('set_lang', lang='en' if lang=='zh' else 'zh', next=request.path) }}"
   class="login-theme-btn" style="right:60px;" title="{{ 'English' if lang=='zh' else '中文' }}">
  <i class="bi bi-translate"></i>
</a>

<button class="login-theme-btn" onclick="toggleTheme()" title="{{ _('toggle_theme') }}">
  <i id="theme-icon" class="bi bi-sun"></i>
</button>

<div class="login-page">
  <div class="login-card">
    <div class="login-icon">H2</div>
    <h1>{{ _('login_header') }}</h1>
    <div class="sub">{{ _('login_subtitle') }}</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="alert alert-danger">
        <i class="bi bi-exclamation-circle mr-1"></i>{{ msg }}
      </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}" autocomplete="on">
      <input type="hidden" name="next" value="{{ next }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="login-field">
        <label for="username">{{ _('login_username') }}</label>
        <input id="username" type="text" name="username" placeholder="admin" autocomplete="username" required autofocus>
      </div>

      <div class="login-field">
        <label for="password">{{ _('login_password') }}</label>
        <div class="pw-wrap">
          <input id="password" type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" class="pw-eye" onclick="togglePw()">
            <i class="bi bi-eye" id="pw-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="login-btn">{{ _('login_btn') }}</button>
    </form>

    {% if guest_mode %}
    <div style="text-align:center;margin-top:16px;">
      <a href="{{ url_for('guest_login') }}"
         style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text3);text-decoration:none;padding:8px 16px;border-radius:8px;border:1px solid var(--border);transition:color .15s,background .15s;"
         onmouseover="this.style.color='var(--text)';this.style.background='var(--surface2)'"
         onmouseout="this.style.color='var(--text3)';this.style.background='transparent'">
        <i class="bi bi-eye"></i> {{ _('guest_mode') }}
      </a>
    </div>
    {% endif %}

    <div class="login-footer">{{ _('login_footer') }}</div>
  </div>
</div>

<script>
(function(){
  var t = localStorage.getItem('h2s-theme');
  if(!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  applyTheme(t);
})();

function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  var icon = document.getElementById('theme-icon');
  if(icon) icon.className = 'bi ' + (t === 'dark' ? 'bi-sun' : 'bi-moon-stars-fill');
}

function toggleTheme() {
  var cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  var html = document.documentElement;
  html.classList.add('theme-transitioning');
  applyTheme(cur);
  localStorage.setItem('h2s-theme', cur);
  setTimeout(function(){ html.classList.remove('theme-transitioning'); }, 400);
}

function togglePw() {
  var inp = document.getElementById('password');
  var eye = document.getElementById('pw-eye');
  if(inp.type === 'password') { inp.type = 'text'; eye.className = 'bi bi-eye-slash'; }
  else { inp.type = 'password'; eye.className = 'bi bi-eye'; }
}
</script>
</body>
</html>
