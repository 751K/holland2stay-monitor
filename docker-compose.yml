services:
  h2s:
    build: .
    image: h2s-monitor
    container_name: h2s
    restart: unless-stopped
    mem_limit: 512M
    cpus: 1.0
    # 不对外暴露端口，由 Caddy 反代
    expose:
      - "8088"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env
      # 只读挂入 Caddyfile，供 entrypoint 预检占位域名
      - ./Caddyfile:/app/Caddyfile.check:ro
    environment:
      - PYTHONUNBUFFERED=1
      # 本地/隔离网络部署时设为 1 可跳过安全预检
      # - H2S_SKIP_PREFLIGHT=1
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8088/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ./logs/caddy:/var/log/caddy
    networks:
      - web
    depends_on:
      - h2s

networks:
  web:

volumes:
  caddy_data:
  caddy_config:
