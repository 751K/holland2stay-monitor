services:
  h2s:
    build: .
    image: h2s-monitor
    container_name: h2s
    restart: unless-stopped
    mem_limit: 512M
    cpus: 1.0
    # 不对外暴露端口，由 Caddy 反代
    expose:
      - "8088"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env
      # 只读挂入 Caddyfile，供 entrypoint 预检占位域名
      - ./Caddyfile:/app/Caddyfile.check:ro
    environment:
      - PYTHONUNBUFFERED=1
      # ⚠️ 抓取代理（HTTPS_PROXY/ALL_PROXY，绕 Cloudflare）一旦设置，Python urllib
      # 默认会把**所有**请求（含 localhost 健康检查）都走代理 → 代理拒连 localhost
      # 返回 403 → 容器被标 unhealthy。NO_PROXY 把本机地址排除在代理之外，
      # 让健康检查 + App 内部 localhost 调用直连。外部抓取目标仍走代理不受影响。
      - NO_PROXY=localhost,127.0.0.1,::1
      - no_proxy=localhost,127.0.0.1,::1
      # 本地/隔离网络部署时设为 1 可跳过安全预检
      # - H2S_SKIP_PREFLIGHT=1
      # 代理：将宿主机环境变量传入容器（需同时在 .env 中设置对应的值）。
      # 优先级：HTTPS_PROXY > HTTP_PROXY > ALL_PROXY。
      # 例：- HTTPS_PROXY=http://user:pass@proxy:8080
      # - HTTPS_PROXY=${HTTPS_PROXY}
      # - HTTP_PROXY=${HTTP_PROXY}
      # - ALL_PROXY=${ALL_PROXY}
    networks:
      - web
    healthcheck:
      # 显式空 ProxyHandler：即便 NO_PROXY 没生效也强制直连，不走抓取代理。
      test: ["CMD-SHELL", "python -c \"import urllib.request as u; u.build_opener(u.ProxyHandler({})).open('http://localhost:8088/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ./logs/caddy:/var/log/caddy
    networks:
      - web
    depends_on:
      - h2s

networks:
  web:

volumes:
  caddy_data:
  caddy_config:
