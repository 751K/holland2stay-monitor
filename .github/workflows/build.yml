name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .dmg
        run: bash packaging/build_dmg.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-dmg
          path: dist/FlatRadar.dmg

      - name: Upload to Release (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FlatRadar.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .exe
        shell: cmd
        run: packaging/build.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/FlatRadar.zip

      - name: Upload to Release (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FlatRadar.zip

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          # 经 env 传入避免 GitHub Actions 表达式多行替换被 shell 拆行；
          # tr -d 去掉 base64 的换行/回车（wrap 或 CRLF 会让 base64 -d 报 invalid input）
          printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | tr -d '\r\n' | base64 -d > android/app/google-services.json
          test -s android/app/google-services.json \
            || { echo "::error::google-services.json 解码后为空——检查 GOOGLE_SERVICES_JSON_BASE64 secret"; exit 1; }
          python3 -c "import json,sys; json.load(open('android/app/google-services.json'))" \
            || { echo "::error::解码出的不是合法 JSON——secret 内容可能不是 base64 或被截断"; exit 1; }

      - name: Decode Android signing key
        if: startsWith(github.ref, 'refs/tags/')
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_SIGNING_READY=false" >> "$GITHUB_ENV"
            echo "::notice::ANDROID_KEYSTORE_BASE64 is not configured; skipping signed Android AAB."
            exit 0
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n' | base64 -d > android/sign.p12
          test -s android/sign.p12 \
            || { echo "::error::keystore 解码后为空——检查 ANDROID_KEYSTORE_BASE64 secret"; exit 1; }
          echo "ANDROID_SIGNING_READY=true" >> "$GITHUB_ENV"

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build release AAB (for Google Play)
        if: startsWith(github.ref, 'refs/tags/') && env.ANDROID_SIGNING_READY == 'true'
        working-directory: android
        env:
          RELEASE_STORE_FILE: ../sign.p12
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY || '' }}
        run: |
          ./gradlew :app:bundleRelease
          ./gradlew :app:assembleRelease

      - name: Upload AAB to Release (for Google Play)
        if: startsWith(github.ref, 'refs/tags/') && env.ANDROID_SIGNING_READY == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload APK to Release (for direct download)
        if: startsWith(github.ref, 'refs/tags/') && env.ANDROID_SIGNING_READY == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk

      - name: Build debug APK (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        working-directory: android
        env:
          MAPS_API_KEY: ''
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
