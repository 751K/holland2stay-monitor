name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .dmg
        run: bash build_dmg.sh

      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Holland2Stay Monitor.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .exe
        shell: cmd
        run: build.bat

      - name: Upload ZIP
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Holland2Stay Monitor.zip
