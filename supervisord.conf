[supervisord]
nodaemon=true
logfile=/app/logs/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
loglevel=info
; supervisord 自己的 pid 写到 /tmp，不占 /app/data
pidfile=/tmp/supervisord.pid

; ── 监控进程 ─────────────────────────────────────────────────────
[program:monitor]
command=python -u monitor.py
directory=/app
autostart=true
autorestart=true
; 崩溃后最多重启 10 次；若持续崩溃由 Docker healthcheck 兜底重启容器
startretries=10
; 优雅停止：先等 10 秒让 monitor 完成当前轮次
stopwaitsecs=10
; monitor 内部用 Python logging 写 data/monitor.log，不重复 capture
redirect_stderr=true
stdout_logfile=/app/logs/monitor_stdout.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3

; ── Web 面板 ─────────────────────────────────────────────────────
[program:web]
; 容器内必须绑定 0.0.0.0，否则宿主机无法访问
command=python -u web.py --host 0.0.0.0
directory=/app
autostart=true
autorestart=true
startretries=3
stopwaitsecs=10
redirect_stderr=true
stdout_logfile=/app/logs/web.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
